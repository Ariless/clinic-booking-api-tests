# Playwright suite — smoke gates API + E2E (parallel), merged Allure report on GitHub Pages.
name: Playwright tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: http://127.0.0.1:3000
  RATE_LIMIT_REGISTER_MAX: 1000
  RATE_LIMIT_LOGIN_MAX: 1000
  RATE_LIMIT_BOOKING_MAX: 1000

# ── Smoke ────────────────────────────────────────────────────────────────────
# Fast gate on every push / PR. API and E2E jobs start only if this passes.
jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.SUT_GITHUB_REPOSITORY || 'Ariless/clinic-booking-api' }}
          path: sut

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & seed SUT
        working-directory: sut
        run: npm ci && npm run db:seed

      - name: Start SUT
        working-directory: sut
        run: |
          npm start > /tmp/sut.log 2>&1 &
          echo $! > /tmp/sut.pid
          for i in $(seq 1 45); do
            if curl -sf "${{ env.BASE_URL }}/health" > /dev/null; then
              echo "SUT ready"; exit 0
            fi
            sleep 1
          done
          echo "=== SUT failed to start ===" && cat /tmp/sut.log && exit 1

      - name: Install Playwright
        run: npm ci && npx playwright install chromium --with-deps

      - name: Smoke (@smoke)
        run: npm run test:smoke

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/
          if-no-files-found: ignore

      - name: Stop SUT
        if: always()
        run: |
          [ -f /tmp/sut.pid ] && kill "$(cat /tmp/sut.pid)" 2>/dev/null || true

# ── API tests ────────────────────────────────────────────────────────────────
# Full tests/api suite. Runs in parallel with E2E after smoke passes.
  api:
    name: API tests
    needs: [smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.SUT_GITHUB_REPOSITORY || 'Ariless/clinic-booking-api' }}
          path: sut

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & seed SUT
        working-directory: sut
        run: npm ci && npm run db:seed

      - name: Start SUT
        working-directory: sut
        run: |
          npm start > /tmp/sut.log 2>&1 &
          echo $! > /tmp/sut.pid
          for i in $(seq 1 45); do
            if curl -sf "${{ env.BASE_URL }}/health" > /dev/null; then
              echo "SUT ready"; exit 0
            fi
            sleep 1
          done
          echo "=== SUT failed to start ===" && cat /tmp/sut.log && exit 1

      - name: Install Playwright
        run: npm ci && npx playwright install chromium --with-deps

      - name: API tests
        run: npm run test:api

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          if-no-files-found: ignore

      - name: Stop SUT
        if: always()
        run: |
          [ -f /tmp/sut.pid ] && kill "$(cat /tmp/sut.pid)" 2>/dev/null || true

# ── E2E & UI ─────────────────────────────────────────────────────────────────
# Browser tests (tests/e2e + tests/ui). --pass-with-no-tests keeps the job green
# until those directories are committed. workers:1 for SQLite safety.
  e2e:
    name: E2E & UI
    needs: [smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.SUT_GITHUB_REPOSITORY || 'Ariless/clinic-booking-api' }}
          path: sut

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & seed SUT
        working-directory: sut
        run: npm ci && npm run db:seed

      - name: Start SUT
        working-directory: sut
        run: |
          npm start > /tmp/sut.log 2>&1 &
          echo $! > /tmp/sut.pid
          for i in $(seq 1 45); do
            if curl -sf "${{ env.BASE_URL }}/health" > /dev/null; then
              echo "SUT ready"; exit 0
            fi
            sleep 1
          done
          echo "=== SUT failed to start ===" && cat /tmp/sut.log && exit 1

      - name: Install Playwright
        run: npm ci && npx playwright install chromium --with-deps

      - name: E2E & UI tests
        run: npm run test:browser

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: playwright-report/
          if-no-files-found: ignore

      - name: Stop SUT
        if: always()
        run: |
          [ -f /tmp/sut.pid ] && kill "$(cat /tmp/sut.pid)" 2>/dev/null || true

# ── Allure report ─────────────────────────────────────────────────────────────
# Merges allure-results from all three jobs and deploys to GitHub Pages.
# Runs even if api or e2e failed so the report always reflects the latest run.
  allure-report:
    name: Allure report
    needs: [api, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Download allure results — smoke
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/
        continue-on-error: true

      - name: Download allure results — api
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
        continue-on-error: true

      - name: Download allure results — e2e
        uses: actions/download-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/
        continue-on-error: true

      - name: Restore Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare history + environment
        run: |
          mkdir -p allure-results
          if [ -d gh-pages/history ]; then
            echo "Restoring Allure history"
            cp -r gh-pages/history allure-results/history
          fi
          printf 'Node.js=%s\nSUT=%s\nBase.URL=%s\n' \
            "$(node --version)" \
            "${{ vars.SUT_GITHUB_REPOSITORY || 'Ariless/clinic-booking-api' }}" \
            "${{ env.BASE_URL }}" \
            > allure-results/environment.properties

      - name: Generate Allure report
        run: npx allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false